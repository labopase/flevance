services:
  redis:
    image: redis:7-alpine
    container_name: flevance-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - flevance_redis_data:/data
    networks:
      - flevance-network
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flevance-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - flevance_zookeeper_data:/var/lib/zookeeper/data
      - flevance_zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - flevance-network
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flevance-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: flevance-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://flevance-kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - flevance_kafka_data:/var/lib/kafka/data
    networks:
      - flevance-network
  postgres:
    image: postgres:16-alpine
    container_name: flevance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - flevance_postgres_data:/var/lib/postgresql/data
    networks:
      - flevance-network
  nats:
    image: nats:2.10-alpine
    container_name: flevance-nats
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
      - "6222:6222"
    command:
      - "--http_port=8222"
      - "--user=${NATS_USER:-admin}"
      - "--pass=${NATS_PASSWORD}"
    volumes:
      - flevance_nats_data:/data
    networks:
      - flevance-network
volumes:
  flevance_redis_data:
    driver: local
  flevance_kafka_data:
    driver: local
  flevance_zookeeper_data:
    driver: local
  flevance_zookeeper_logs:
    driver: local
  flevance_postgres_data:
    driver: local
  flevance_nats_data:
    driver: local
networks:
  flevance-network:
    driver: bridge
    name: flevance-network
